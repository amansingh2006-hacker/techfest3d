<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus '26 | Interactive 3D Techfest</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

    <style>
        body {
            margin: 0;
            overflow-x: hidden;
            background-color: #020617;
            font-family: system-ui, -apple-system, sans-serif;
        }
        /* 3D Canvas ko piche fixed rakhne ke liye */
        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            z-index: -1;
        }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <div id="scroll-container" class="relative w-full text-white bg-transparent">
        
        <section class="h-screen flex flex-col justify-center items-start px-12 md:px-24">
            <h1 class="text-7xl md:text-9xl font-black tracking-tighter bg-clip-text text-transparent bg-gradient-to-r from-cyan-400 to-purple-600 uppercase">
                NEXUS '26
            </h1>
            <p class="mt-4 text-xl md:text-2xl text-slate-400 max-w-md">
                The quantum leap of tech festivals. Scroll to initiate reality warp.
            </p>
            <div class="mt-8 animate-bounce text-cyan-400 text-sm tracking-widest uppercase">
                ↓ Scroll to Explore
            </div>
        </section>

        <section class="h-screen flex justify-end items-center px-12 md:px-24 bg-slate-950/40 backdrop-blur-sm">
            <div class="max-w-lg text-right">
                <h2 class="text-5xl font-bold text-pink-500 mb-4">THE COMPETITIONS</h2>
                <p class="text-slate-300 text-lg">
                    Look at the core shifting in 3D space. Prepare yourself for Hackathons, Robo-Wars, and Cyber Security captures.
                </p>
            </div>
        </section>

        <section class="h-screen flex flex-col justify-center items-center text-center px-6">
            <h2 class="text-6xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-green-400 to-cyan-400 mb-6">
                SECURE YOUR ACCESS PASS
            </h2>
            <button onclick="alert('Ticket Generated!')" class="px-8 py-4 bg-cyan-500 text-slate-950 font-bold text-lg rounded-none hover:bg-white hover:scale-105 transition-all shadow-[0_0_30px_rgba(6,182,212,0.5)]">
                GENERATE TICKET
            </button>
        </section>
    </div>

    <script>
        // GSAP ScrollTrigger plugin ko register karna
        gsap.registerPlugin(ScrollTrigger);

        // --- Three.js Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        
        // Camera setup
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 8;

        // Renderer setup
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        container.appendChild(renderer.domElement);

        // --- Lightings (Roshni) ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const pointLight1 = new THREE.PointLight(0x00f3ff, 2, 50);
        pointLight1.position.set(5, 5, 5);
        scene.add(pointLight1);

        const pointLight2 = new THREE.PointLight(0xff007f, 1.5, 50);
        pointLight2.position.set(-5, -5, -5);
        scene.add(pointLight2);

        
 // --- 3D Objects ---
        // 1. Center Matrix Core (Wireframe Sphere)
        const coreGeometry = new THREE.SphereGeometry(2, 32, 32);
        const coreMaterial = new THREE.MeshStandardMaterial({
            color: 0x00f3ff,
            wireframe: true,
            roughness: 0.1
        });
        const coreMesh = new THREE.Mesh(coreGeometry, coreMaterial);
        scene.add(coreMesh);

        // 2. Floating Crystal Node
        const nodeGeometry = new THREE.OctahedronGeometry(0.6, 0);
        const nodeMaterial = new THREE.MeshStandardMaterial({
            color: 0xff007f,
            emissive: 0xff007f,
            emissiveIntensity: 0.5
        });
        const nodeMesh = new THREE.Mesh(nodeGeometry, nodeMaterial);
        nodeMesh.position.set(3, 1, 2);
        scene.add(nodeMesh);

        // --- Animation Loop (Lagatar ghumne ke liye) ---
        function animate() {
            requestAnimationFrame(animate);
            
            // Core aur Node ko dheere dheere rotate karna
            coreMesh.rotation.y += 0.003;
            coreMesh.rotation.x += 0.001;
            
            nodeMesh.rotation.x += 0.01;
            nodeMesh.rotation.y += 0.01;

            renderer.render(scene, camera);
        }
        animate();

        // --- GSAP Scroll Interaction (Scroll karne par Camera hilega) ---
        gsap.to(camera.position, {
            scrollTrigger: {
                trigger: "#scroll-container",
                start: "top top",
                end: "bottom bottom",
                scrub: 1 // Scroll ke sath smoothly chalega
            },
            x: -2,
            y: 1,
            z: 3 // Target position jab user end tak scroll karega
        });

        // Window resize hone par 3D screen ko sahi rakhna
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
